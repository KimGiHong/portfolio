<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="paper-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="9" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.32 0 0 0 0 0.28 0 0 0 0 0.20 0 0 0 0.5 0"/>
    </filter>
  </defs>

  <!-- paper base -->
  <rect width="1200" height="630" fill="#FAF6EC"/>
  <!-- fiber grain overlay -->
  <rect width="1200" height="630" filter="url(#paper-grain)" opacity="0.06" style="mix-blend-mode:multiply"/>

  <!-- watermark large italic 'K' -->
  <text x="1080" y="540" font-family="'Fraunces', 'Times New Roman', serif" font-style="italic" font-weight="200"
        font-size="540" fill="#B8463D" fill-opacity="0.08" text-anchor="end">K</text>

  <!-- top kicker -->
  <g transform="translate(96, 130)">
    <rect x="0" y="-2" width="40" height="2" fill="#B8463D"/>
    <text x="56" y="2" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20"
          letter-spacing="4" fill="#787068" text-transform="uppercase">PORTFOLIO · 2026</text>
  </g>

  <!-- main name italic -->
  <text x="96" y="280" font-family="'Fraunces', 'Times New Roman', serif" font-style="italic" font-weight="300"
        font-size="124" fill="#2B2A26" letter-spacing="-2">KimGiHong</text>

  <!-- Korean name -->
  <text x="100" y="350" font-family="'Gowun Batang', 'Apple SD Gothic Neo', serif" font-size="48"
        fill="#37352F" fill-opacity="0.85">김기홍</text>

  <!-- tagline -->
  <text x="96" y="450" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-size="28"
        fill="#37352F">가독성 · 효율 · 최적화 · 최신 기술 — 네 축을 같은 무게로 다루는</text>
  <text x="96" y="488" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-size="28"
        fill="#37352F">프론트엔드 엔지니어.</text>

  <!-- bottom meta line -->
  <g transform="translate(96, 560)">
    <text font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" letter-spacing="3"
          fill="#787068" text-transform="uppercase">Frontend · AI-paired with Claude · Querensys</text>
  </g>
</svg>
